      {"@type": "Question", "name": "What does Sivussa actually do?", "acceptedAnswer": {"@type": "Answer", "text": "Sivussa audits any web page for visibility issues — SEO, content quality, accessibility, and AI search readiness. You get a scored report with prioritized, actionable fixes. No setup, no integration. Paste a URL, get results."}},
      {"@type": "Question", "name": "What's the difference between SEO, GEO, and AEO?", "acceptedAnswer": {"@type": "Answer", "text": "SEO helps traditional search engines find and rank your pages. GEO ensures AI-powered search engines like Google's AI Overviews and ChatGPT cite your content. AEO focuses on getting your content used as direct answers in voice search and featured snippets. Sivussa checks all three."}},
      {"@type": "Question", "name": "What's included in the free tier vs. paid plans?", "acceptedAnswer": {"@type": "Answer", "text": "The free tier provides a baseline audit — basic SEO checks and an overall score. Paid plans unlock the full 21-point analysis including GEO and AEO readiness, competitive comparison, content depth scoring, and detailed fix instructions."}},
      {"@type": "Question", "name": "How often should I run audits?", "acceptedAnswer": {"@type": "Answer", "text": "Weekly plans suit teams actively publishing or running campaigns. Monthly works for steady-state sites. Yearly is fine for mostly static content."}},
      {"@type": "Question", "name": "How long does an audit take?", "acceptedAnswer": {"@type": "Answer", "text": "Under 60 seconds for a standard page. Complex pages with heavy JavaScript or large media may take slightly longer."}},
      {"@type": "Question", "name": "Is my data safe?", "acceptedAnswer": {"@type": "Answer", "text": "We don't store your page content after the audit completes. Reports are generated on-the-fly. We use industry-standard encryption in transit. We never sell data to third parties."}},
      {"@type": "Question", "name": "Can I cancel anytime?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. There are no contracts or cancellation fees. Cancel from your account settings and your subscription ends at the current billing period."}},
      {"@type": "Question", "name": "What makes Sivussa different from other SEO tools?", "acceptedAnswer": {"@type": "Answer", "text": "Most SEO tools give you data dashboards. Sivussa gives you answers. Our AI-powered analysis explains what's wrong, why it matters, and exactly how to fix it. No jargon, no learning curve. We specifically cover GEO and AEO, which most tools ignore."}},
      {"@type": "Question", "name": "Do I need technical knowledge to use the reports?", "acceptedAnswer": {"@type": "Answer", "text": "No. Each finding is written in plain language with a specific fix. Non-technical users can hand the report to their developer with confidence."}},
      {"@type": "Question", "name": "What types of sites does Sivussa work with?", "acceptedAnswer": {"@type": "Answer", "text": "Any publicly accessible web page. WordPress, Shopify, custom builds, static sites, single-page applications — if a URL loads in a browser, we can audit it."}}
