name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          
      - uses: biomejs/setup-biome@v2
        with:
          version: 2.4.13
          
      - run: biome ci .

  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          
      - run: npm ci
      
      - run: npx tsc --noEmit
      
      - run: npx vite build