name: Ensure staging branch

on:
  push:
    branches:
      - main
  delete:

permissions:
  contents: write

jobs:
  ensure-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Recreate staging if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git ls-remote --exit-code --heads origin staging > /dev/null 2>&1; then
            echo "staging branch exists"
          else
            echo "staging branch missing — recreating from main"
            git push origin HEAD:refs/heads/staging
          fi